# Gitea Pages Nginx Configuration
# Security-hardened static file serving with wildcard domain routing
# Note: For production, use envsubst to replace ${DOMAIN} or edit directly

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Security: Hide version
    server_tokens off;

    # Security: Disable symlink following (prevent symlink attacks)
    disable_symlinks on;

    # Security: Disable directory listing
    autoindex off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream for deployer service (for main domain fallback)
    upstream deployer {
        server deployer:8080;
    }

    # Default server - redirect to deployer UI when accessing without username subdomain
    # Matches: pages.local, pages.example.com, etc.
    server {
        listen 80 default_server;
        server_name pages.local pages.localhost *.pages.local *.pages.localhost;

        # For requests without username subdomain, proxy to deployer
        location / {
            proxy_pass http://deployer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTP Server - Wildcard domain routing for user sites
    # Matches: username.pages.example.com or username.pages.localhost
    server {
        listen 80;
        # Match any subdomain ending with .pages.* (catches .pages.local, .pages.localhost, .pages.example.com, etc.)
        server_name ~^(?<username>[^.]+)\.pages\.;

        root /var/www/pages/$username;

        # Security: Block access to _root directory directly
        location ~ ^/_root(/|$) {
            return 403;
        }

        # Security: Block access to .git directories
        location ~ ^/\.git(/|$) {
            return 403;
        }

        # Security: Block access to hidden files
        location ~ /\. {
            return 403;
        }

        # Smart routing: try _root first for root path, then subdirectory
        location = / {
            # For root path, serve from _root directory first
            try_files /_root/index.html =404;
        }

        # For other paths, try subdirectory first, then _root
        location / {
            # First try the exact path (subdirectory sites)
            # Then try under _root (root directory sites)
            try_files $uri $uri/ /_root$uri /_root$uri/ =404;
        }

        # Handle 404
        error_page 404 /404.html;
        location = /404.html {
            internal;
            root /var/www/pages/_error;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # HTTPS Server - Uncomment and configure for production
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name ~^(?<username>[^.]+)\.pages\.;
    #
    #     # SSL certificates - update paths for your domain
    #     ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    #
    #     # SSL security settings
